<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRG2 — Aktiv lernen</title>
<style>
  :root{
    --bg:#13151c; --bg2:#181b24; --surface:#1d212c; --surface2:#222735;
    --ink:#eef0f4; --ink2:#aeb4c2; --ink3:#727a8c;
    --line:#2c3140; --line2:#3a4254;
    --recall:#e6a94e; --recall-soft:#3a2f1c;
    --known:#46c39a; --known-soft:#16352c;
    --again:#e08a76; --again-soft:#3a2620;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f3f1ea; --bg2:#ece9df; --surface:#ffffff; --surface2:#faf8f2;
      --ink:#1b1d22; --ink2:#4a4f5a; --ink3:#8a8f9a;
      --line:#e0ddd2; --line2:#cfccc0;
      --recall:#b9772a; --recall-soft:#f7ecda;
      --known:#1d9874; --known-soft:#e2f3ec;
      --again:#c25c43; --again-soft:#f8e9e4;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:0 18px 80px}
  .top{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin:0 -18px 22px;padding:14px 18px 12px}
  .top-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;max-width:760px;margin:0 auto}
  .brand{font-family:var(--mono);font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
  .score{font-family:var(--mono);font-size:.82rem;color:var(--ink2)}
  .score b{color:var(--known);font-size:1rem}
  .bar{height:5px;background:var(--line);border-radius:99px;margin:10px auto 0;max-width:760px;overflow:hidden}
  .bar>i{display:block;height:100%;width:0;background:var(--known);border-radius:99px;transition:width .4s ease}
  .head{padding:26px 0 6px}
  .head h1{font-size:1.55rem;font-weight:700;letter-spacing:-.01em;line-height:1.15}
  .head p{color:var(--ink2);font-size:.92rem;margin-top:7px}
  .filters{display:flex;gap:7px;flex-wrap:wrap;margin:18px 0 6px;align-items:center}
  .chip{font-family:var(--mono);font-size:.74rem;letter-spacing:.02em;padding:6px 12px;border:1px solid var(--line2);background:var(--surface);color:var(--ink2);border-radius:99px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--ink3);color:var(--ink)}
  .chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .chip .n{opacity:.6;margin-left:5px}
  .spacer{flex:1}
  .mini{font-family:var(--mono);font-size:.72rem;color:var(--ink3);background:none;border:none;cursor:pointer;padding:6px 4px;text-decoration:underline;text-underline-offset:3px}
  .mini:hover{color:var(--again)}
  .section-block{margin-top:30px;scroll-margin-top:90px}
  .section-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line)}
  .section-num{font-family:var(--mono);font-size:.78rem;color:var(--recall);border:1px solid var(--line2);border-radius:7px;padding:3px 8px;flex-shrink:0}
  .section-name{font-size:1.12rem;font-weight:650;letter-spacing:-.01em}
  .section-prog{font-family:var(--mono);font-size:.72rem;color:var(--ink3);margin-left:auto;flex-shrink:0}
  .card{position:relative;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line2);border-radius:11px;margin-bottom:9px;overflow:hidden;transition:.18s}
  .card.known{border-left-color:var(--known)}
  .card.again{border-left-color:var(--again)}
  .q{padding:14px 16px;cursor:pointer;font-size:.95rem;font-weight:550;display:flex;gap:11px;align-items:flex-start}
  .q:hover{background:var(--surface2)}
  .q .tag{font-family:var(--mono);font-size:.6rem;flex-shrink:0;margin-top:3px;width:16px;height:16px;border-radius:5px;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--ink3)}
  .card.known .q .tag{background:var(--known);border-color:var(--known);color:#fff}
  .card.again .q .tag{background:var(--again);border-color:var(--again);color:#fff}
  .q .qt{flex:1}
  .q .cue{font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;color:var(--recall);flex-shrink:0;margin-top:3px;opacity:.85;transition:.15s}
  .card.open .q .cue{opacity:0}
  .ans{max-height:0;overflow:hidden;transition:max-height .28s ease}
  .card.open .ans{max-height:900px}
  .ans-inner{padding:0 16px 14px 43px;font-size:.9rem;color:var(--ink)}
  .ans-inner .body{border-top:1px dashed var(--line2);padding-top:11px;color:var(--ink2);white-space:pre-wrap}
  .ans-inner .body strong{color:var(--ink);font-weight:650}
  code{font-family:var(--mono);font-size:.84em;background:var(--bg2);color:var(--recall);padding:2px 6px;border-radius:5px}
  .grade{display:flex;gap:8px;margin-top:13px;white-space:normal}
  .gbtn{font-family:var(--mono);font-size:.74rem;letter-spacing:.02em;padding:7px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--line2);background:var(--surface2);color:var(--ink2);transition:.15s}
  .gbtn.g-known:hover,.gbtn.g-known.sel{background:var(--known-soft);border-color:var(--known);color:var(--known)}
  .gbtn.g-again:hover,.gbtn.g-again.sel{background:var(--again-soft);border-color:var(--again);color:var(--again)}
  .empty{text-align:center;color:var(--ink3);font-family:var(--mono);font-size:.82rem;padding:40px 0}
  .toc{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .toc a{font-family:var(--mono);font-size:.7rem;color:var(--ink3);text-decoration:none;border:1px solid var(--line);padding:4px 9px;border-radius:7px;transition:.15s}
  .toc a:hover{color:var(--recall);border-color:var(--recall)}
  *:focus-visible{outline:2px solid var(--recall);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  @media (max-width:560px){.head h1{font-size:1.3rem}.ans-inner{padding-left:16px}}
</style>
</head>
<body>
<div class="top">
  <div class="top-row">
    <span class="brand">PRG2 · Theorie</span>
    <span class="score"><b id="s-known">0</b> / <span id="s-total">0</span> sitzt</span>
  </div>
  <div class="bar"><i id="barfill"></i></div>
</div>

<div class="wrap">
  <div class="head">
    <h1>Aktiv lernen statt nur lesen</h1>
    <p>Erst selbst antworten → dann aufdecken → ehrlich bewerten.</p>
  </div>

  <div class="filters">
    <button class="chip on" data-f="all">Alle <span class="n" id="c-all">0</span></button>
    <button class="chip" data-f="open">Noch offen <span class="n" id="c-open">0</span></button>
    <button class="chip" data-f="again">Nochmal <span class="n" id="c-again">0</span></button>
    <span class="spacer"></span>
    <button class="mini" id="reset">Fortschritt zurücksetzen</button>
  </div>

  <div class="toc" id="toc"></div>
  <div id="content"></div>
  <div class="empty" id="empty" style="display:none">Nichts hier — Filter oben wechseln.</div>
</div>

<script>

const KEY="prg2_progress_v1";
let state={};
try{ state=JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ state={}; }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }

let filter="all";
let allIds=[];
DATA.forEach((sec,si)=>sec.items.forEach((it,ii)=>{ it._id=si+"_"+ii; allIds.push(it._id); }));

const content=document.getElementById('content');
const toc=document.getElementById('toc');

function passes(id){
  if(filter==="all") return true;
  if(filter==="open") return state[id]!=="known";
  if(filter==="again") return state[id]==="again";
}

function build(){
  toc.innerHTML=""; content.innerHTML="";
  DATA.forEach((sec,si)=>{
    const a=document.createElement('a');
    a.href="#sec"+si; a.textContent=sec.name; toc.appendChild(a);
    const visible=sec.items.filter(it=>passes(it._id));
    if(visible.length===0) return;
    const block=document.createElement('div');
    block.className="section-block"; block.id="sec"+si;
    const known=sec.items.filter(it=>state[it._id]==="known").length;
    block.innerHTML=`<div class="section-head">
        <span class="section-num">${sec.num}</span>
        <span class="section-name">${sec.name}</span>
        <span class="section-prog">${known}/${sec.items.length}</span>
      </div>`;
    visible.forEach(it=>block.appendChild(cardEl(it)));
    content.appendChild(block);
  });
  document.getElementById('empty').style.display=content.children.length?"none":"block";
  refreshStats();
}

function cardEl(it){
  const st=state[it._id]||"";
  const card=document.createElement('div');
  card.className="card"+(st?" "+st:"");
  const mark=st==="known"?"✓":st==="again"?"↻":"";
  card.innerHTML=`
    <div class="q">
      <span class="tag">${mark}</span>
      <span class="qt">${it.q}</span>
      <span class="cue">ANTWORT</span>
    </div>
    <div class="ans"><div class="ans-inner"><div class="body">${it.a.replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      <div class="grade">
        <button class="gbtn g-known${st==="known"?" sel":""}">Sitzt ✓</button>
        <button class="gbtn g-again${st==="again"?" sel":""}">Nochmal ↻</button>
      </div>
    </div></div></div>`;
  card.querySelector('.q').addEventListener('click',()=>card.classList.toggle('open'));
  card.querySelector('.g-known').addEventListener('click',e=>{e.stopPropagation();grade(it._id,"known");});
  card.querySelector('.g-again').addEventListener('click',e=>{e.stopPropagation();grade(it._id,"again");});
  return card;
}

function grade(id,val){ state[id]=state[id]===val?"":val; save(); build(); }

function refreshStats(){
  const total=allIds.length;
  const known=allIds.filter(i=>state[i]==="known").length;
  const open=allIds.filter(i=>state[i]!=="known").length;
  const again=allIds.filter(i=>state[i]==="again").length;
  document.getElementById('s-known').textContent=known;
  document.getElementById('s-total').textContent=total;
  document.getElementById('c-all').textContent=total;
  document.getElementById('c-open').textContent=open;
  document.getElementById('c-again').textContent=again;
  document.getElementById('barfill').style.width=(total?Math.round(known/total*100):0)+"%";
}

document.querySelectorAll('.chip').forEach(ch=>{
  ch.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
    ch.classList.add('on'); filter=ch.dataset.f; build();
  });
});
document.getElementById('reset').addEventListener('click',()=>{
  if(confirm("Gesamten Lernfortschritt zurücksetzen?")){ state={}; save(); build(); }
});

build();
</script>
